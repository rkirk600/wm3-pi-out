<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kuula Fix</title>
  <style>
    html, body { height: 100%; margin: 0; }
    .kuula-wrap { position: fixed; inset: 0; }
    .kuula-wrap iframe { width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <div class="kuula-wrap">
    <iframe
      allowfullscreen
      allow="xr-spatial-tracking; gyroscope; accelerometer"
      scrolling="no"
      src="https://kuula.co/share/7Vmq1?logo=-1&info=0&fs=1&vr=1&zoom=1&sd=1&thumbs=-1&alpha=0.60&inst=0">
    </iframe>
  </div>
</body>
</html>
